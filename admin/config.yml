backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"
site_url: "https://guileless-jalebi-ce4981.netlify.app"
display_url: "https://guileless-jalebi-ce4981.netlify.app"
logo_url: "/assets/logo-prevenprofe.png"
locale: "es"
publish_mode: simple

collections:
  - name: "contenidos"
    label: "Contenido de PrevenProfe"
    files:
      - name: "resources"
        label: "Recursos docentes"
        file: "content/resources.json"
        format: "json"
        fields:
          - label: "Recursos"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} · {{fields.category}}"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Descripción", name: "description", widget: "text"}
              - {label: "Categoría", name: "category", widget: "select", options: ["IPE I", "IPE II", "PRL", "Nóminas", "Contratos", "Emprendimiento", "Empleabilidad", "Digitalización", "Sostenibilidad", "Proyecto Intermodular"]}
              - {label: "Tipo", name: "type", widget: "select", options: ["pdf", "link", "video", "audio"]}
              - label: "Archivo o URL"
                name: "url"
                widget: "string"
                hint: "Puedes pegar una URL o subir primero el archivo en el campo multimedia del panel."
      - name: "posts"
        label: "Vídeos, pódcast, artículos y noticias"
        file: "content/posts.json"
        format: "json"
        fields:
          - label: "Publicaciones"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} · {{fields.kind}}"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Resumen", name: "excerpt", widget: "text"}
              - {label: "Tipo", name: "kind", widget: "select", options: ["Artículo", "YouTube", "Pódcast", "Noticia", "Investigación"]}
              - {label: "Fecha", name: "date", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false}
              - {label: "URL", name: "url", widget: "string"}
      - name: "projects"
        label: "Proyectos"
        file: "content/projects.json"
        format: "json"
        fields:
          - label: "Proyectos"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} · {{fields.status}}"
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Descripción", name: "description", widget: "text"}
              - {label: "Estado", name: "status", widget: "select", options: ["Idea", "En desarrollo", "Activo", "Publicado", "Buscando colaboración"]}
